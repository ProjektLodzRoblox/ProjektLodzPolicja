<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Generator raportu</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    width: 900px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #0f172a;
    color: white;
}

input::placeholder {
    color: #64748b;
}

.buttons {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.generate {
    background: #22c55e;
}

.copy {
    background: #3b82f6;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

pre {
    margin-top: 20px;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    color: #22c55e;
    font-size: 13px;
    overflow-x: auto;
    display: none;
}
</style>
</head>

<body>

<div class="container">
<h2>🚔 Generator raportu</h2>

<div class="grid">
<input id="nick" placeholder="Nick">
<input id="stopien" placeholder="Stopień">
<input id="odznaka" placeholder="Nr odznaki" maxlength="5">
<input id="radio" placeholder="Radio (DC)">
<input id="taser" placeholder="Taser">
<input id="powodTaser" placeholder="Powód tasera">
<input id="bron" placeholder="Broń palna">
<input id="powodBron" placeholder="Powód broni">
<input id="kajdanki" placeholder="Kajdanki">
<input id="powodKajdanki" placeholder="Powód kajdanek">
<input id="partner" placeholder="Partner">
<input id="pojazd" placeholder="Pojazd">
<input id="godziny" placeholder="Godziny">
<input id="zatrzymani" placeholder="Zatrzymani" maxlength="10">
<input id="dowod" placeholder="Dowód w postaci ss (TAK/NIE)">
<input id="uwagi" placeholder="Uwagi (jeśli nie ma zostaw puste)">
</div>

<div class="buttons">
<button class="generate" onclick="generuj()">Generuj</button>
<button class="copy" onclick="kopiuj()">Kopiuj</button>
</div>

<canvas id="canvas" style="display: none;"></canvas>
</div>

<script>
function wrap(text, width) {
    let result = [];
    text = text || "";

    while (text.length > width) {
        result.push(text.substring(0, width));
        text = text.substring(width);
    }
    result.push(text);
    return result;
}

function linia(label, value, width = 42) {
    let lines = wrap(value, width);
    let out = [];

    lines.forEach((line, i) => {
        if (i === 0) {
            let txt = (label + line).padEnd(width);
            out.push(`│ ${txt} │`);
        } else {
            let txt = line.padEnd(width);
            out.push(`│ ${txt} │`);
        }
    });

    return out.join("\n");
}

async function kopiuj() {
    try {
        const canvas = document.getElementById("canvas");

        canvas.toBlob(async (blob) => {
            if (!blob) {
                alert("Błąd generowania obrazu");
                return;
            }

            await navigator.clipboard.write([
                new ClipboardItem({
                    "image/png": blob
                })
            ]);

            alert("Skopiowano raport do schowka");
        });

    } catch (err) {
        console.error(err);
        alert("Twoja przeglądarka nie obsługuje kopiowania obrazów");
    }
}

document.addEventListener("DOMContentLoaded", () => {
    alert("Informuję że w dniu 16.04.2026r. strona będzie niedostępna od 00:00 do 20:00 spowodowane jest to pracami nad ulepszeniem strony, prosmy ręcznie wypisywać raporty! Przepraszam za problem ale będzie mocna przebudowa :)");
});


function generuj() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    canvas.style.display = "";

    const width = 900;
    const height = 550;

    canvas.width = width;
    canvas.height = height;

    // tło
    ctx.fillStyle = "#0b1220";
    ctx.fillRect(0, 0, width, height);

    // header
    ctx.fillStyle = "#111827";
    roundRect(ctx, 20, 20, width - 40, 70, 12, true);

    ctx.fillStyle = "#38bdf8";
    ctx.font = "bold 26px Segoe UI";
    ctx.fillText("🚔 RAPORT SŁUŻBY", 40, 65);

    ctx.fillStyle = "#9ca3af";
    ctx.font = "14px Segoe UI";
    ctx.fillText(new Date().toLocaleDateString("pl-PL"), width - 150, 65);

    // kolumny
    drawSection("FUNKCJONARIUSZ", 20, 110, 420, [
        ["Nick", nick.value],
        ["Stopień", stopien.value],
        ["Nr odznaki", odznaka.value],
        ["Partner", partner.value]
    ]);

    drawSection("UŻYCIE", 460, 110, 420, [
        ["Radio", radio.value],
        ["Taser", taser.value],
        ["Broń palna", bron.value],
        ["Kajdanki", kajdanki.value]
    ]);

    drawSection("SZCZEGÓŁY", 20, 280, 860, [
        ["Powód tasera", powodTaser.value],
        ["Powód broni", powodBron.value],
        ["Powód kajdanek", powodKajdanki.value]
    ]);

    drawSection("PODSUMOWANIE", 20, 400, 860, [
        ["Godziny", godziny.value],
        ["Zatrzymani", zatrzymani.value],
        ["Dowód (w postaci ss)", dowod.value],
        ["Uwagi", uwagi.value]
    ]);

    function drawSection(title, x, y, w, fields) {
        // box
        ctx.fillStyle = "#111827";
        roundRect(ctx, x, y, w, 140, 10, true);

        // title
        ctx.fillStyle = "#38bdf8";
        ctx.font = "bold 14px Segoe UI";
        ctx.fillText(title, x + 15, y + 25);

        // divider
        ctx.fillStyle = "#1f2937";
        ctx.fillRect(x + 15, y + 35, w - 30, 1);

        let offsetY = y + 60;

        fields.forEach(f => {
            ctx.fillStyle = "#9ca3af";
            ctx.font = "12px Segoe UI";
            ctx.fillText(f[0], x + 15, offsetY);

            ctx.fillStyle = "#e5e7eb";
            ctx.font = "12px Consolas";
            ctx.fillText(f[1] || "-", x + 150, offsetY);

            offsetY += 25;
        });
    }
}

function roundRect(ctx, x, y, w, h, r, fill) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    if(fill) ctx.fill();
}
</script>

</body>
</html>
