<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>Generator raportu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h2>🚔 Generator raportu</h2>

    <div id="loadingModal">
      <div class="loadingBox">
        <div id="loadingIcon" class="spinner"></div>
        <div class="loadingText">Generowanie raportu...</div>
      </div>
    </div>
    <!--<div id="changelogIcon" onclick="openChangelog()" style="cursor:pointer;color:white;">
      📜 Dziennik zmian
    </div> -->

    <div class="grid">
      <div id="maintenance" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
color:white;
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:22px;
text-align:center;
">
        <h1>🚧 Chwilowa przerwa techniczna strony!</h1>
        <h1>Na ten czas proszę o ręczne wypisywanie raportów na kanale discord!</h1>
        <p>Strona wróci za:</p>
        <h2 id="timer"></h2>
      </div>
      <div id="signatureModal" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
z-index:10000;
justify-content:center;
align-items:center;
flex-direction:column;
">
  </div>

  <script src="script.js"></script>

    <div style="
width:800px;
height:500px;
background:#111827;
border-radius:12px;
display:flex;
overflow:hidden;
color:white;
position:relative;
">

      <div onclick="closeChangelog()" style="
position:absolute;
top:10px;
right:15px;
cursor:pointer;
color:white;
font-size:18px;
z-index:10;
">
        ✖
      </div>

      <div style="width:35%;background:#0b1220;padding:15px;overflow-y:auto;">
        <h3 style="text-align:center;margin:10px 0;">Wersje</h3>

        <div onclick="loadVersion('0.0.1')"
          style="padding:10px;cursor:pointer;background:#1f2937;margin-bottom:5px;border-radius:6px;">
          0.0.1 - Start
        </div>
      </div>

      <div style="width:65%;padding:20px;overflow-y:auto;">
        <h3 id="versionTitle">Wybierz wersję</h3>
        <pre id="versionContent" style="white-space:pre-wrap;color:#d1d5db;"></pre>
      </div>

    </div>

  </div>

  </div>

  </div>
</body>

</html>
